<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Plex</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5b6675;
      --line: #dfe4ec;
      --accent: #1769aa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111418;
        --panel: #181d23;
        --text: #f3f6fa;
        --muted: #b7c0ca;
        --line: #303842;
        --accent: #71b7ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-weight: 650;
      text-decoration: none;
    }

    .primary {
      border-color: transparent;
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">PlexLoader redirect</h1>
    <p id="message">Страница готова принимать ссылки от PlexLoader.</p>
    <div class="actions">
      <a class="button primary" id="plexWebLink" href="https://app.plex.tv/desktop">Открыть Plex Web</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get("key") || "";
    const server = params.get("server") || "";
    const hasTarget = Boolean(key && server);

    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const plexWebLink = document.getElementById("plexWebLink");

    function plexWebUrl(metadataKey, machineId) {
      if (!metadataKey || !machineId) {
        return "https://app.plex.tv/desktop";
      }
      return `https://app.plex.tv/desktop/#!/server/${encodeURIComponent(machineId)}/details?key=${encodeURIComponent(metadataKey)}`;
    }

    function plexAppUrl(metadataKey, machineId) {
      if (!metadataKey || !machineId) {
        return "plex://";
      }
      return `plex://preplay/?metadataKey=${encodeURIComponent(metadataKey)}&server=${encodeURIComponent(machineId)}`;
    }

    if (hasTarget) {
      const webUrl = plexWebUrl(key, server);
      const appUrl = plexAppUrl(key, server);
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      title.textContent = "Открываю Plex";
      message.textContent = "Если приложение не открылось автоматически, используйте Plex Web.";
      plexWebLink.href = webUrl;

      if (isMobile) {
        location.href = appUrl;
        setTimeout(() => {
          location.href = webUrl;
        }, 1200);
      } else {
        location.replace(webUrl);
      }
    } else {
      plexWebLink.href = "https://app.plex.tv/desktop";
    }
  </script>
</body>
</html>
