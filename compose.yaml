services:
  tg_torrent_drop:
    image: ghcr.io/kimorev/tg-torrent-bot:latest
    container_name: tg_torrent_drop
    restart: unless-stopped
    pull_policy: always
    labels:
      # Watchtower will only auto-update containers with this label set to true.
      - "com.centurylinklabs.watchtower.enable=true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tg_torrent_drop_state:/data
      # Optional: read-only bind-mount of the NAS movie volume.
      # Enables the «📀 Хранилище» block in /admin (free/used GB + forecast +
      # alert at STORAGE_ALERT_PERCENT). Remove this line to disable the
      # feature — bot will simply skip the block.
      # If your movies live in another path, change the LEFT side only.
      - /volume1/video:/storage:ro
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      ALLOWED_CHAT_IDS: "${ALLOWED_CHAT_IDS}"
      ADMIN_CHAT_IDS: "${ADMIN_CHAT_IDS:-}"
      ACCESS_APPROVALS_ENABLED: "${ACCESS_APPROVALS_ENABLED:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-Europe/Moscow}"
      BOT_TIMEZONE: "${BOT_TIMEZONE:-Europe/Moscow}"
      MAX_TORRENT_FILE_MB: "${MAX_TORRENT_FILE_MB:-20}"
      STATE_DIR: "${STATE_DIR:-/data}"
      DS_URL: "${DS_URL}"
      DS_ACCOUNT: "${DS_ACCOUNT}"
      DS_PASSWORD: "${DS_PASSWORD}"
      DS_DESTINATION: "${DS_DESTINATION:-}"
      DS_VERIFY_SSL: "${DS_VERIFY_SSL:-false}"
      TRACKERS_MODE: "${TRACKERS_MODE:-auto}"
      TRACKERS_URL: "${TRACKERS_URL:-https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_best.txt}"
      TRACKERS_MAX: "${TRACKERS_MAX:-20}"
      TRACKERS_CACHE_TTL_HOURS: "${TRACKERS_CACHE_TTL_HOURS:-24}"
      TRACKERS_BACKGROUND_ENABLED: "${TRACKERS_BACKGROUND_ENABLED:-true}"
      TRACKERS_BACKGROUND_INTERVAL_SECONDS: "${TRACKERS_BACKGROUND_INTERVAL_SECONDS:-180}"
      TASK_NOTIFICATIONS_ENABLED: "${TASK_NOTIFICATIONS_ENABLED:-true}"
      TASK_NOTIFICATION_STATUSES: "${TASK_NOTIFICATION_STATUSES:-finished,seeding,error}"
      TASK_NOTIFY_EXTERNAL_TASKS: "${TASK_NOTIFY_EXTERNAL_TASKS:-false}"
      NOTIFY_CHAT_IDS: "${NOTIFY_CHAT_IDS:-}"
      AUTO_DELETE_FINISHED_AFTER_HOURS: "${AUTO_DELETE_FINISHED_AFTER_HOURS:-24}"
      AUTO_DELETE_FINISHED_STATUSES: "${AUTO_DELETE_FINISHED_STATUSES:-finished}"
      MAGNET_POLL_ATTEMPTS: "${MAGNET_POLL_ATTEMPTS:-8}"
      MAGNET_POLL_INTERVAL_SECONDS: "${MAGNET_POLL_INTERVAL_SECONDS:-1.5}"
      DS_RETRY_ATTEMPTS: "${DS_RETRY_ATTEMPTS:-3}"
      DS_RETRY_DELAY: "${DS_RETRY_DELAY:-2.0}"
      RUTRACKER_USERNAME: "${RUTRACKER_USERNAME:-}"
      RUTRACKER_PASSWORD: "${RUTRACKER_PASSWORD:-}"
      RUTRACKER_MAX_RESULTS: "${RUTRACKER_MAX_RESULTS:-50}"
      KINOPOISK_API_KEY: "${KINOPOISK_API_KEY:-}"
      MOVIE_DISCOVERY_ENABLED: "${MOVIE_DISCOVERY_ENABLED:-true}"
      MOVIE_DISCOVERY_INTERVAL_HOURS: "${MOVIE_DISCOVERY_INTERVAL_HOURS:-12}"
      MOVIE_DISCOVERY_CACHE_FILE: "${MOVIE_DISCOVERY_CACHE_FILE:-/data/movie_discovery.json}"
      MOVIE_DISCOVERY_SETTINGS_FILE: "${MOVIE_DISCOVERY_SETTINGS_FILE:-/data/movie_discovery_settings.json}"
      MOVIE_DISCOVERY_DEBUG_FILE: "${MOVIE_DISCOVERY_DEBUG_FILE:-/data/movie_discovery_debug.json}"
      MOVIE_DISCOVERY_RUTRACKER_TM: "${MOVIE_DISCOVERY_RUTRACKER_TM:-32}"
      MOVIE_DISCOVERY_JACKETT_REQUIRE_DATE: "${MOVIE_DISCOVERY_JACKETT_REQUIRE_DATE:-true}"
      MOVIE_DISCOVERY_JACKETT_MAX_AGE_DAYS: "${MOVIE_DISCOVERY_JACKETT_MAX_AGE_DAYS:-32}"
      MOVIE_DISCOVERY_LIMIT: "${MOVIE_DISCOVERY_LIMIT:-30}"
      MOVIE_DISCOVERY_MIN_KP_RATING: "${MOVIE_DISCOVERY_MIN_KP_RATING:-6.0}"
      MOVIE_DISCOVERY_QUALITIES: "${MOVIE_DISCOVERY_QUALITIES:-1080p}"
      PLEX_URL: "${PLEX_URL:-}"
      PLEX_TOKEN: "${PLEX_TOKEN:-}"
      PLEX_MOVIE_SECTION: "${PLEX_MOVIE_SECTION:-}"
      PLEX_DEEPLINK_BASE_URL: "${PLEX_DEEPLINK_BASE_URL:-}"
      SUBSCRIPTION_CHECK_INTERVAL_HOURS: "${SUBSCRIPTION_CHECK_INTERVAL_HOURS:-6}"
      JACKETT_URL: "${JACKETT_URL:-}"
      JACKETT_API_KEY: "${JACKETT_API_KEY:-}"
      JACKETT_INDEXERS: "${JACKETT_INDEXERS:-all}"
      JACKETT_MAX_RESULTS: "${JACKETT_MAX_RESULTS:-20}"
      JACKETT_FETCH_LIMIT: "${JACKETT_FETCH_LIMIT:-100}"
      JACKETT_SEARCH_TIMEOUT_SECONDS: "${JACKETT_SEARCH_TIMEOUT_SECONDS:-90}"
      JACKETT_WARMUP_ENABLED: "${JACKETT_WARMUP_ENABLED:-true}"
      JACKETT_WARMUP_INTERVAL_SECONDS: "${JACKETT_WARMUP_INTERVAL_SECONDS:-900}"
      JACKETT_WARMUP_QUERY: "${JACKETT_WARMUP_QUERY:-1080p}"
      JACKETT_WARMUP_INDEXERS: "${JACKETT_WARMUP_INDEXERS:-auto}"
      JACKETT_WARMUP_BATCH_SIZE: "${JACKETT_WARMUP_BATCH_SIZE:-3}"
      PENDING_DOWNLOADS_ENABLED: "${PENDING_DOWNLOADS_ENABLED:-true}"
      PENDING_DOWNLOADS_INTERVAL_SECONDS: "${PENDING_DOWNLOADS_INTERVAL_SECONDS:-300}"
      PENDING_DOWNLOADS_TTL_HOURS: "${PENDING_DOWNLOADS_TTL_HOURS:-24}"
      SERIES_BULK_JOBS_FILE: "${SERIES_BULK_JOBS_FILE:-/data/series_bulk_jobs.json}"
      STORAGE_ALERT_PERCENT: "${STORAGE_ALERT_PERCENT:-90}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      VOICE_SEARCH_ENABLED: "${VOICE_SEARCH_ENABLED:-true}"
      VOICE_MAX_SECONDS: "${VOICE_MAX_SECONDS:-30}"
      GPT_ENABLED: "${GPT_ENABLED:-true}"
      GPT_MODEL: "${GPT_MODEL:-gpt-4o-mini}"

  # Watchtower auto-updates labelled containers when a new image digest appears in GHCR.
  # Polls every 5 minutes. Only the tg_torrent_drop container is watched (label filter).
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      # Reuse the bot's BOT_TOKEN and ADMIN_CHAT_IDS from .env — no extra secrets needed.
      # Comma-separated chat IDs in ADMIN_CHAT_IDS work directly with shoutrrr's telegram://.
      # Empty ADMIN_CHAT_IDS → Watchtower runs without notifications (updates still happen).
      WATCHTOWER_NOTIFICATION_URL: "telegram://${BOT_TOKEN}@telegram?chats=${ADMIN_CHAT_IDS}"
      WATCHTOWER_NOTIFICATION_REPORT: "true"
      # Russian compact template. Sends a message only when something actually
      # changed (Updated > 0 or Failed > 0) — REPORT mode suppresses empty bodies.
      WATCHTOWER_NOTIFICATION_TEMPLATE: |
        {{- if .Report -}}
          {{- with .Report -}}
            {{- if .Updated -}}
        🔄 PlexLoader обновлён
        {{range .Updated}}• {{.Name}} → {{.LatestImageID.ShortID}}
        {{end -}}
            {{- end -}}
            {{- if .Failed -}}
        ⚠️ Не удалось обновить PlexLoader
        {{range .Failed}}• {{.Name}}: {{.Error}}
        {{end -}}
            {{- end -}}
          {{- end -}}
        {{- end -}}
      TZ: "${TZ:-Europe/Moscow}"

volumes:
  tg_torrent_drop_state:
